version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    ignore:
      # eslint-config-next bundles eslint-plugin-react which uses a removed
      # eslint@10 API (getFilename). Upgrade eslint together with next/
      # eslint-config-next once they ship a compatible eslint-plugin-react.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # TypeScript 6.0 has breaking tsconfig changes and next@16.x has not
      # explicitly validated TS6 support. Revisit when Next.js announces it.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
